before-command: |
  #!/bin/bash
  set -e

  # Install PHP 8.3 and required extensions
  sudo apt-get update
  sudo apt-get install -y php8.3 php8.3-cli php8.3-mbstring php8.3-xml php8.3-curl php8.3-zip php8.3-sqlite3 php8.3-dom unzip

  # Install Composer
  curl -sS https://getcomposer.org/installer | php
  sudo mv composer.phar /usr/local/bin/composer

  # Install PHP dependencies
  composer install --no-interaction --prefer-dist

  # Setup .env for SQLite
  cp .env.example .env
  sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
  sed -i 's|^DB_DATABASE=.*|DB_DATABASE='$(pwd)'/database/database.sqlite|' .env
  sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=file/' .env
  sed -i 's/^CACHE_STORE=.*/CACHE_STORE=file/' .env
  sed -i 's/^APP_DEBUG=.*/APP_DEBUG=true/' .env
  sed -i 's/^APP_ENV=.*/APP_ENV=local/' .env

  # Remove MySQL-specific env lines that would confuse SQLite
  sed -i '/^DB_HOST=/d' .env
  sed -i '/^DB_PORT=/d' .env
  sed -i '/^DB_USERNAME=/d' .env
  sed -i '/^DB_PASSWORD=/d' .env

  # Create a fresh SQLite database file (remove old one to avoid duplicate seed errors)
  rm -f database/database.sqlite
  touch database/database.sqlite

  # Generate app key
  php artisan key:generate --no-interaction

  # Run migrations and seed with fresh database
  php artisan migrate --seed --no-interaction
preview-commands:
  - id: laravel-server
    title: Laravel Server
    description: Starts the Laravel development server on port 8000
    command: |
      #!/bin/bash
      set -e

      export APP_URL="${MATTER_PREVIEW_URL}"

      # Start Laravel dev server in foreground
      php artisan serve --host=0.0.0.0 --port=8000
preview-port: 8000
