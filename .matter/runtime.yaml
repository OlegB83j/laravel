before-command: |
  #!/bin/bash
  set -e

  # Install PHP 8.3 and required extensions
  sudo apt-get update
  sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
    php8.3-cli php8.3-mbstring php8.3-xml php8.3-curl \
    php8.3-sqlite3 php8.3-bcmath php8.3-zip php8.3-tokenizer

  # Install Composer
  curl -sS https://getcomposer.org/installer | php
  sudo mv composer.phar /usr/local/bin/composer

  # Install PHP dependencies
  composer install --no-interaction --no-progress

  # Set up .env for SQLite
  cp .env.example .env
  sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
  sed -i 's/^DB_HOST=.*/#DB_HOST=127.0.0.1/' .env
  sed -i 's/^DB_PORT=.*/#DB_PORT=3306/' .env
  sed -i 's/^DB_DATABASE=.*/#DB_DATABASE=laravel/' .env
  sed -i 's/^DB_USERNAME=.*/#DB_USERNAME=root/' .env
  sed -i 's/^DB_PASSWORD=.*/#DB_PASSWORD=/' .env

  # Create SQLite database file
  touch database/database.sqlite

  # Generate app key
  php artisan key:generate --no-interaction

  # Run migrations and seed
  php artisan migrate --seed --no-interaction
preview-commands:
  - id: laravel-app
    title: Laravel App
    command: |
      #!/bin/bash
      set -e

      export APP_URL="${MATTER_PREVIEW_URL}"
      export SESSION_DOMAIN="${MATTER_PREVIEW_HOST}"
      export SESSION_SECURE_COOKIE=true
      export SESSION_SAME_SITE=none

      php artisan serve --host=0.0.0.0 --port=8000
preview-port: 8000
service-previews:
  - id: laravel-app
    title: Laravel App
    description: Start the Laravel development server
    command: |
      #!/bin/bash
      set -e

      export APP_URL="${MATTER_PREVIEW_URL}"
      export SESSION_DOMAIN="${MATTER_PREVIEW_HOST}"
      export SESSION_SECURE_COOKIE=true

      # Trust the reverse proxy
      export TRUSTED_PROXIES="*"

      php artisan serve --host=0.0.0.0 --port=8000
    preview-port: 8000
